name: CI

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: zem/go.mod

      - name: Run zem tests
        working-directory: zem
        run: go test ./...

      - name: Install Godot headless
        env:
          GODOT_VERSION: 4.4.1
        run: |
          set -euo pipefail
          curl -L -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64

      - name: Headless Godot startup smoke test
        run: /tmp/godot/Godot_v4.4.1-stable_linux.x86_64 --headless --path . --quit-after 1

  native-bridge-experimental:
    name: Native Bridge Experimental (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            target: linux/arm64
            target_label: linux-arm64
            cgo_cc: ""
            cgo_cxx: ""
            scons_cc: ""
            scons_cxx: ""
            scons_ar: ""
            scons_ranlib: ""
            cgo_cflags: ""
            cgo_cxxflags: ""
            cgo_ldflags: ""
          - runner: windows-11-arm
            target: windows/arm64
            target_label: windows-arm64
            cgo_cc: clang
            cgo_cxx: clang++
            scons_cc: ""
            scons_cxx: ""
            scons_ar: ""
            scons_ranlib: ""
            cgo_cflags: --target=aarch64-pc-windows-msvc
            cgo_cxxflags: --target=aarch64-pc-windows-msvc
            cgo_ldflags: --target=aarch64-pc-windows-msvc
          - runner: macos-15-intel
            target: macos/x86_64
            target_label: macos-x86_64
            cgo_cc: ""
            cgo_cxx: ""
            scons_cc: ""
            scons_cxx: ""
            scons_ar: ""
            scons_ranlib: ""
            cgo_cflags: ""
            cgo_cxxflags: ""
            cgo_ldflags: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: zem/go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        shell: bash
        run: python -m pip install scons

      - name: Set up Windows build environment
        if: matrix.target == 'windows/arm64'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -property installationPath
          $vsDevCmd = Join-Path $installPath "Common7\Tools\VsDevCmd.bat"
          $envDump = cmd /c "`"$vsDevCmd`" -arch=arm64 -host_arch=arm64 >nul && set"
          $envDump | Where-Object { $_ -match '^[A-Za-z_][A-Za-z0-9_]*=' } | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check out godot-cpp
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot-cpp
          ref: godot-4.4-stable
          path: external/godot-cpp

      - name: Build native backend bridge
        shell: bash
        env:
          GODOT_CPP_DIR: ${{ github.workspace }}/external/godot-cpp
          CC: ${{ matrix.cgo_cc }}
          CXX: ${{ matrix.cgo_cxx }}
          SCONS_CC: ${{ matrix.scons_cc }}
          SCONS_CXX: ${{ matrix.scons_cxx }}
          SCONS_AR: ${{ matrix.scons_ar }}
          SCONS_RANLIB: ${{ matrix.scons_ranlib }}
          CGO_CFLAGS: ${{ matrix.cgo_cflags }}
          CGO_CXXFLAGS: ${{ matrix.cgo_cxxflags }}
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}
        run: |
          set -euo pipefail
          bash ./build_zem_gdextension.sh \
            --target "${{ matrix.target }}" \
            --out-dir "${{ github.workspace }}/build/native-bridge/${{ matrix.target }}"

      - name: Upload native bridge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-bridge-experimental-${{ matrix.target_label }}
          path: build/native-bridge/${{ matrix.target }}
          if-no-files-found: error
