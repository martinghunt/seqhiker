name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  export-cross-platform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux/amd64
            preset: Linux x86_64
            output: dist/seqhiker-${{ github.ref_name }}-linux-x86_64
          - target: linux/arm64
            preset: Linux arm64
            output: dist/seqhiker-${{ github.ref_name }}-linux-arm64
          - target: windows/arm64
            preset: Windows arm64
            output: dist/seqhiker-${{ github.ref_name }}-windows-arm64.exe
          - target: windows/amd64
            preset: Windows x86_64
            output: dist/seqhiker-${{ github.ref_name }}-windows-x86_64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release tag matches project version
        run: |
          set -euo pipefail
          project_version="$(sed -n 's/^config\/version="\([^"]*\)"/\1/p' project.godot | head -n1)"
          expected_tag="v${project_version}"
          if [[ -z "${project_version}" ]]; then
            echo "Failed to read project version from project.godot" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Release tag/version mismatch:" >&2
            echo "  tag:     ${GITHUB_REF_NAME}" >&2
            echo "  project: ${project_version}" >&2
            echo "Expected tag: ${expected_tag}" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: zem/go.mod

      - name: Run zem tests
        working-directory: zem
        run: go test ./...

      - name: Install Godot headless and export templates
        env:
          GODOT_VERSION: 4.4.1
        run: |
          set -euo pipefail
          curl -L -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          curl -L -o /tmp/godot_templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q /tmp/godot_templates.tpz -d /tmp/godot_templates
          cp -R /tmp/godot_templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Export app for preset
        run: |
          mkdir -p dist
          ./build_release.sh \
            --target "${{ matrix.target }}" \
            --preset "${{ matrix.preset }}" \
            --out "${{ matrix.output }}" \
            --godot-bin /tmp/godot/Godot_v4.4.1-stable_linux.x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}
          path: ${{ matrix.output }}
          if-no-files-found: error

  export-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin/arm64
            preset: macOS arm64
            output: dist/seqhiker-${{ github.ref_name }}-macos-arm64.dmg
          - target: darwin/amd64
            preset: macOS x86_64
            output: dist/seqhiker-${{ github.ref_name }}-macos-x86_64.dmg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release tag matches project version
        run: |
          set -euo pipefail
          project_version="$(sed -n 's/^config\/version="\([^"]*\)"/\1/p' project.godot | head -n1)"
          expected_tag="v${project_version}"
          if [[ -z "${project_version}" ]]; then
            echo "Failed to read project version from project.godot" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Release tag/version mismatch:" >&2
            echo "  tag:     ${GITHUB_REF_NAME}" >&2
            echo "  project: ${project_version}" >&2
            echo "Expected tag: ${expected_tag}" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: zem/go.mod

      - name: Run zem tests
        working-directory: zem
        run: go test ./...

      - name: Install Godot headless and export templates
        env:
          GODOT_VERSION: 4.4.1
        run: |
          set -euo pipefail
          curl -L -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot.app/Contents/MacOS/Godot
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          curl -L -o /tmp/godot_templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q /tmp/godot_templates.tpz -d /tmp/godot_templates
          cp -R /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Export app for preset
        run: |
          mkdir -p dist
          ./build_release.sh \
            --target "${{ matrix.target }}" \
            --preset "${{ matrix.preset }}" \
            --out "${{ matrix.output }}" \
            --godot-bin /tmp/godot/Godot.app/Contents/MacOS/Godot

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}
          path: ${{ matrix.output }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - export-cross-platform
      - export-macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Verify downloaded artifacts exist
        run: |
          set -euo pipefail
          test -d release-assets
          find release-assets -type f | grep -q .

      - name: Resolve release title from annotated tag
        id: release_title
        run: |
          set -euo pipefail
          git fetch --force --tags
          object_type="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(objecttype)' | head -n1)"
          title=""
          if [[ "${object_type}" == "tag" ]]; then
            title="$(git cat-file tag "${GITHUB_REF_NAME}" | sed '1,/^$/d' | head -n1)"
          fi
          if [[ -z "${title}" ]]; then
            title="${GITHUB_REF_NAME}"
          fi
          {
            echo "title<<EOF"
            echo "${title}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create checksums
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find release-assets -type f -exec sha256sum {} \; | sed 's#  release-assets/##' > release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_title.outputs.title }}
          body: ""
          files: |
            release-assets/**/*
