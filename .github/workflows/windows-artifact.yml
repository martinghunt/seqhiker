name: Windows Artifact

on:
  workflow_dispatch:
    inputs:
      export_mode:
        description: Godot export mode
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
  push:
    branches-ignore:
      - main
    paths:
      - ".github/workflows/windows-artifact.yml"
      - ".github/workflows/release.yml"
      - "build_release.sh"
      - "build_zem_bins.sh"
      - "export_presets.cfg"
      - "project.godot"
      - "assets/icons/**"
      - "zem/**"

permissions:
  contents: read

jobs:
  export-windows-artifact:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows/amd64
            preset: Windows x86_64
            output: dist/seqhiker-${{ github.ref_name }}-windows-x86_64.zip
          - target: windows/arm64
            preset: Windows arm64
            output: dist/seqhiker-${{ github.ref_name }}-windows-arm64.zip

    env:
      EXPORT_MODE: ${{ inputs.export_mode || 'release' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: zem/go.mod

      - name: Run zem tests
        working-directory: zem
        run: go test ./...

      - name: Install Godot headless and export templates
        env:
          GODOT_VERSION: 4.4.1
        run: |
          set -euo pipefail
          curl -L -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          curl -L -o /tmp/godot_templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q /tmp/godot_templates.tpz -d /tmp/godot_templates
          cp -R /tmp/godot_templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Install Wine and rcedit
        run: |
          set -euo pipefail
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32
          mkdir -p "$HOME/.local/bin" "$HOME/.config/godot"
          curl -L -o "$HOME/.local/bin/rcedit-x64.exe" "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe"
          chmod +x "$HOME/.local/bin/rcedit-x64.exe"
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            "export/windows/rcedit = \"$HOME/.local/bin/rcedit-x64.exe\"" \
            "export/windows/wine = \"$(command -v wine)\"" \
            > "$HOME/.config/godot/editor_settings-4.tres"

      - name: Export Windows build
        run: |
          mkdir -p dist
          ./build_release.sh \
            --target "${{ matrix.target }}" \
            --preset "${{ matrix.preset }}" \
            --out "${{ matrix.output }}" \
            --mode "${EXPORT_MODE}" \
            --godot-bin /tmp/godot/Godot_v4.4.1-stable_linux.x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.preset }}-${{ env.EXPORT_MODE }}
          path: ${{ matrix.output }}
          if-no-files-found: error
